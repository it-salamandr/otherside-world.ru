<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap');

:root{
  --bg:#0a0908;
  --panel:#16110f;
  --panel2:#221916;
  --bone:#b98b68;
  --flesh:#7f5b47;
  --glow:#d8a37a;
  --text:#d4c0ae;
  --muted:#8e7563;
  --line:#4b3528;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:
    linear-gradient(rgba(10,8,7,0.88), rgba(10,8,7,0.94)),
    url('./modules/images/3b2cc60c5ccbe144216cf79398768a9e.jpg');

  background-size:cover;
  background-position:center center;
  background-attachment:fixed;

  font-family:'Orbitron', sans-serif;
  color:var(--text);
  overflow-x:hidden;
}

.wrapper{
  width:100%;
  max-width:900px;
  padding:24px;
}

.panel{
  position:relative;
  background:
    linear-gradient(145deg,var(--panel),var(--panel2));
  border:1px solid var(--line);
  border-radius:22px;
  padding:32px;
  overflow:hidden;
  box-shadow:
    0 0 40px rgba(0,0,0,0.8),
    inset 0 0 30px rgba(255,180,120,0.06);
}

.panel::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(255,180,120,0.06), transparent 40%),
    radial-gradient(circle at bottom right, rgba(255,180,120,0.03), transparent 50%);
  pointer-events:none;
}

h1{
  margin:0 0 14px;
  text-align:center;
  font-size:39px;
  letter-spacing:4px;
  color:var(--bone);
  text-shadow:0 0 12px rgba(216,163,122,.35);
}

.description{
  text-align:center;
  color:var(--muted);
  margin-bottom:32px;
  font-size:29px;
}

.controls{
  display:grid;
  gap:22px;
  margin-bottom:30px;
}

.select-block{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.select-label{
  color:var(--bone);
  font-size:26px;
  letter-spacing:2px;
  text-transform:uppercase;
}

.scorn-select{
  width:100%;
  background:
    linear-gradient(145deg,#1e1714,#120f0d);
  color:var(--text);
  border:1px solid #5b4335;
  border-radius:14px;
  padding:16px 18px;
  font-size:26px;
  font-family:'Orbitron',sans-serif;
  appearance:none;
  outline:none;
  cursor:pointer;
  transition:.25s;
  box-shadow:
    inset 0 0 14px rgba(255,170,120,0.04),
    0 0 14px rgba(0,0,0,.4);
}

.scorn-select:hover{
  border-color:var(--glow);
  box-shadow:
    inset 0 0 18px rgba(255,170,120,0.08),
    0 0 18px rgba(216,163,122,.18);
}

.scorn-select:focus{
  border-color:var(--glow);
  box-shadow:
    0 0 0 2px rgba(216,163,122,.15),
    0 0 24px rgba(216,163,122,.22);
}

.center{
  position:relative;
  background:
    linear-gradient(145deg,#171210,#0d0a09);
  border:1px solid #4d382c;
  border-radius:24px;
  padding:30px;
  min-height:320px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  box-shadow:
    inset 0 0 28px rgba(255,180,120,.04),
    0 0 24px rgba(0,0,0,.6);
  font-size:27px;
}

.center::before{
  content:"";
  position:absolute;
  inset:10px;
  border:1px solid rgba(185,139,104,.08);
  border-radius:18px;
  pointer-events:none;
}

.center strong{
  color:var(--glow);
  font-size:30px;
  line-height:1.6;
}

.center em{
  color:var(--bone);
  font-style:normal;
}

.center p{
  margin:8px 0;
  line-height:1.8;
}

.special{
  margin-top:18px;
  padding-top:18px;
  border-top:1px solid rgba(185,139,104,.2);
}

#thumb{
  width:100px;
  margin-top:16px;
  border-radius:10px;
  border:1px solid #6b4d3c;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 0 16px rgba(216,163,122,.2);
}

#thumb:hover{
  transform:scale(1.06);
  box-shadow:0 0 26px rgba(216,163,122,.35);
}

#bigImage{
  position:fixed;
  right:24px;
  bottom:24px;
  width:320px;
  max-width:45vw;
  border-radius:16px;
  border:1px solid #7b5a48;
  display:none;
  z-index:999;
  box-shadow:
    0 0 40px rgba(0,0,0,.8),
    0 0 30px rgba(216,163,122,.25);
}

.footer{
  margin-top:24px;
  text-align:center;
  color:var(--muted);
}

.footer a{
  color:var(--bone);
  text-decoration:none;
  transition:.25s;
}

.footer a:hover{
  color:var(--glow);
  text-shadow:0 0 10px rgba(216,163,122,.45);
}

@keyframes appearDisappearSmoke{
  0%{opacity:0;filter:blur(6px);}
  30%{opacity:1;filter:blur(0);}
  70%{opacity:1;filter:blur(0);}
  100%{opacity:0;filter:blur(6px);}
}

.smoke-fade-cycle{
  animation:appearDisappearSmoke 5s infinite ease-in-out;
}

@media(max-width:768px){

  .wrapper{
    padding:14px;
  }

  .panel{
    padding:20px;
    border-radius:18px;
  }

  .controls{
    grid-template-columns:1fr;
    gap:16px;
  }

  h1{
  }

  .description{
    line-height:1.6;
  }

  .center{
    min-height:280px;
    padding:22px 18px;
  }

  .center strong{
  }

  #bigImage{
    width:70vw;
    right:50%;
    transform:translateX(50%);
    bottom:18px;
  }
}

.smoke {
  position: fixed;
  width: 600px;  /* больше — эффект сильнее */
  height: 600px;
  background: radial-gradient(rgba(216,163,122,0.2), transparent 70%); /* чуть плотнее */
  animation: drift 15s linear infinite;
  top: 40%;      /* чуть ниже центра */
  left: 50%;
  pointer-events: none;
  z-index: 1;    /* позади панели */
  filter: blur(40px); /* мягкий дым */
}

@keyframes drift {
  0%   { transform: translate(-50%, -50%) translateY(0) rotate(0deg); opacity:0.25; }
  50%  { transform: translate(-50%, -50%) translateY(-80px) rotate(45deg); opacity:0.15; }
  100% { transform: translate(-50%, -50%) translateY(-160px) rotate(90deg); opacity:0.25; }
}
.panel:hover {
  box-shadow:
    0 0 40px rgba(216,163,122,0.25),
    inset 0 0 40px rgba(255,180,120,0.08);
  transition: 0.6s;
}
.center.fade {
  animation: fadeIn 0.6s ease forwards;
}

@keyframes fadeIn {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}


</style>

const intersectionPrinciples = {
  // Зима: Дек–Фев — только Среда
  "Декабрь_Среда": "Отдых",
  "Январь_Среда": "Отдых",
  "Февраль_Среда": "Отдых",

  // Весна: Мар–Май — Бизнес (Вс, Пн, Вт)
  "Март_Воскресенье": "Бизнес",
  "Март_Понедельник": "Бизнес",
  "Март_Вторник": "Бизнес",
  "Апрель_Воскресенье": "Бизнес",
  "Апрель_Понедельник": "Бизнес",
  "Апрель_Вторник": "Бизнес",
  "Май_Воскресенье": "Бизнес",
  "Май_Понедельник": "Бизнес",
  "Май_Вторник": "Бизнес",

  // Лето: Июн–Авг — Развлечения (Чт, Пт, Сб)
  "Июнь_Четверг": "Развлечения",
  "Июнь_Пятница": "Развлечения",
  "Июнь_Суббота": "Развлечения",
  "Июль_Четверг": "Развлечения",
  "Июль_Пятница": "Развлечения",
  "Июль_Суббота": "Развлечения",
  "Август_Четверг": "Развлечения",
  "Август_Пятница": "Развлечения",
  "Август_Суббота": "Развлечения",

  // Осень: Сен–Ноя — Отношения (Чт, Пт, Сб)
  "Сентябрь_Четверг": "Отношения",
  "Сентябрь_Пятница": "Отношения",
  "Сентябрь_Суббота": "Отношения",
  "Октябрь_Четверг": "Отношения",
  "Октябрь_Пятница": "Отношения",
  "Октябрь_Суббота": "Отношения",
  "Ноябрь_Четверг": "Отношения",
  "Ноябрь_Пятница": "Отношения",
  "Ноябрь_Суббота": "Отношения"
};

// Значения месяцев
const monthValues = {
  "Март": "Расположение / Празднование",
  "Апрель": "Позиционирование",
  "Май": "Маскировка",
  "Июнь": "Блаженство",
  "Июль": "Озарение",
  "Август": "Посредственность",
  "Сентябрь": "Рациональность",
  "Октябрь": "Чистка",
  "Ноябрь": "Уединение",
  "Декабрь": "Прагматичность",
  "Январь": "Привязанность",
  "Февраль": "Выгода"
};

// Значения гильдий (дней недели)
const dayValues = {
  "Воскресенье": "Разведка",
  "Понедельник": "Исследование",
  "Вторник": "Автоматизация",
  "Среда": "Автономность",
  "Четверг": "Политика",
  "Пятница": "Культура",
  "Суббота": "Торговля"
};

// ======================
// SELECTS
// ======================

const monthSelect = document.getElementById('monthSelect');
const daySelect = document.getElementById('daySelect');
const center = document.getElementById('center');

const months = Object.keys(monthValues);
const days = Object.keys(dayValues);

months.forEach(month => {
  const option = document.createElement('option');
  option.value = month;
  option.textContent = month;
  monthSelect.appendChild(option);
});

days.forEach(day => {
  const option = document.createElement('option');
  option.value = day;
  option.textContent = day;
  daySelect.appendChild(option);
});

monthSelect.addEventListener('change', updateCenter);
daySelect.addEventListener('change', updateCenter);

// ======================
// ЛОГИКА
// ======================

function updateCenter(){

  const selectedMonth = monthSelect.value;
  const selectedDay = daySelect.value;

  if(selectedMonth && selectedDay){

    const inter = intersections[selectedMonth]?.[selectedDay];

    if(!inter){
      center.innerHTML = `
        <strong>Нет данных</strong>
        <p>Для выбранного пересечения пока нет описания.</p>
      `;
      return;
    }

    const key = selectedMonth + "_" + selectedDay;
    const principle = intersectionPrinciples[key] || "";

    let html = `
      <strong>
        ${monthValues[selectedMonth]}
        —
        ${dayValues[selectedDay]}
      </strong>

      <p>
        <em>Значение:</em><br>
        ${inter.value}
      </p>

      <p>
        <em>Примечания:</em><br>
        ${inter.notes}
      </p>
    `;

    if(principle){

      html += `
        <div class="special">
          <em>Особенность дня:</em><br><br>
          ${principle}<br>

          <img
            id="thumb"
            src="./modules/images/bonus/${principle}.png"
            alt="${principle}"
          >
        </div>
      `;
    }

    center.innerHTML = html;
center.classList.remove('fade');
void center.offsetWidth; // сброс анимации
center.classList.add('fade');
    setupImageHover(principle);

  } else {

    center.innerHTML = `
      <strong>Перекресток</strong>

      <p>
        Выберите текущий месяц и день недели,
        чтобы открыть значение пересечения.
      </p>
    `;
  }
}

// ======================
// HOVER IMAGE
// ======================

function setupImageHover(principle){

  if(!principle) return;

  const thumb = document.getElementById('thumb');
  const bigImage = document.getElementById('bigImage');

  bigImage.src = `./modules/images/bonus/${principle}.png`;

  thumb.addEventListener('mouseenter', ()=>{
    bigImage.style.display = 'block';
  });

  thumb.addEventListener('mouseleave', ()=>{
    bigImage.style.display = 'none';
  });

  thumb.addEventListener('touchstart', ()=>{

    if(bigImage.style.display === 'block'){
      bigImage.style.display = 'none';
    }else{
      bigImage.style.display = 'block';
    }

  });
}

</script>
